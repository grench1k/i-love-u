<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I Love You</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* ==========================================================
           ЭКСКЛЮЗИВНАЯ МОБИЛЬНАЯ ВЕРСТКА (СТРОГО ДЛЯ СМАРТФОНОВ)
           ========================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffe5ec;
        }

        /* Экраны жестко центрируют всё по вертикали и горизонтали */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            transition: transform 1.1s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 2;
            padding: 20px;
        }

        /* КРУТОЙ ЖИВОЙ ФОН: Переливающиеся неоновые градиенты */
        #page1 { 
            background: linear-gradient(-45deg, #ffe5ec, #ffb3c6, #ff8fa3, #ff4d6d); 
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
        }
        #page2 { 
            background: linear-gradient(-45deg, #ffb3c6, #ff8fa3, #ff4d6d, #c9184a); 
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            transform: translateY(100%); 
        }
        #page3 { 
            background: linear-gradient(-45deg, #ff8fa3, #ff4d6d, #c9184a, #590d22); 
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            transform: translateY(100%); 
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Падающие фоновые сердечки */
        .bg-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.35);
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
            z-index: 1;
            filter: drop-shadow(0 2px 5px rgba(255, 77, 109, 0.3));
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.5) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-15vh) scale(1.3) rotate(360deg); opacity: 0; }
        }

        /* НАДПИСЬ: Элегантная неоновая каллиграфия */
        .love-text {
            font-family: 'Pacifico', cursive;
            font-size: 4rem;
            color: #ffffff;
            font-weight: normal;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px #ff4d6d,
                0 0 40px #ff758f,
                0 0 60px #ff8fa3;
            animation: textPulse 2s ease-in-out infinite alternate;
            user-select: none;
            text-align: center;
            margin-bottom: 50px; 
            letter-spacing: 2px;
        }

        @keyframes textPulse {
            0% { transform: scale(0.95) rotate(-2deg); text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d; }
            100% { transform: scale(1.05) rotate(2deg); text-shadow: 0 0 20px #ff758f, 0 0 40px #ff4d6d, 0 0 60px #ff4d6d; }
        }

        /* КОТИК */
        .cat-container {
            position: relative; 
            width: 130px;
            height: 140px;
            cursor: pointer;
            z-index: 10;
        }

        #cat1 {
            animation: catWalkMobile 2.5s ease-in-out infinite alternate;
        }

        @keyframes catWalkMobile {
            0% { transform: translateX(-15px); }
            100% { transform: translateX(15px); }
        }

        .cat-body-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .ear {
            position: absolute;
            width: 30px;
            height: 44px;
            background: linear-gradient(to bottom, #3a2214, #4a2c1b);
            border-radius: 80% 20% 20% 0% / 100% 100% 0% 0%;
        }
        .ear.left { left: 15px; top: -5px; transform: rotate(-22deg); }
        .ear.right { right: 15px; top: -5px; transform: scaleX(-1) rotate(-22deg); }
        .ear::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 30px;
            background: #ffb3c6;
            left: 4px;
            top: 8px;
            border-radius: 80% 20% 20% 0% / 100% 100% 0% 0%;
        }

        .head {
            position: absolute;
            top: 18px;
            left: calc(50% - 55px);
            width: 110px;
            height: 82px;
            background: #4a2c1b;
            border-radius: 50% 50% 46% 46% / 55% 55% 45% 45%;
            box-shadow: inset -10px -6px 0 #2a180e, 0 6px 12px rgba(0,0,0,0.12);
            z-index: 5;
        }

        .cheeks {
            position: absolute;
            top: 46px;
            left: calc(50% - 28px);
            width: 56px;
            height: 24px;
            display: flex;
            justify-content: space-between;
            z-index: 6;
        }
        .cheeks::before, .cheeks::after {
            content: '';
            width: 29px;
            height: 24px;
            background: #543320;
            border-radius: 50%;
        }

        .eyes {
            position: absolute;
            top: 22px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 6;
        }
        .eye {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 35% 35%, #be845c 0%, #834d29 50%, #462511 100%);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1.5px solid #1a0e08;
        }
        .pupil {
            width: 8px;
            height: 16px;
            background: #080808;
            border-radius: 50%;
            position: relative;
        }
        .pupil::before {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 1px;
        }

        .nose {
            position: absolute;
            top: 48px;
            left: calc(50% - 5px);
            width: 10px;
            height: 6px;
            background: #ff8fa3;
            border-radius: 40% 40% 60% 60%;
            z-index: 7;
        }

        .whiskers-left, .whiskers-right {
            position: absolute;
            top: 50px;
            width: 35px;
            height: 12px;
            z-index: 6;
        }
        .whiskers-left { left: -15px; }
        .whiskers-right { right: -15px; }
        .whiskers-left div, .whiskers-right div { width: 100%; height: 1px; background: rgba(255,255,255,0.6); margin-bottom: 4px; }
        .whiskers-left div:first-child { transform: rotate(12deg); }
        .whiskers-left div:last-child { transform: rotate(-4deg); }
        .whiskers-right div:first-child { transform: rotate(-12deg); }
        .whiskers-right div:last-child { transform: rotate(4deg); }

        .body {
            position: absolute;
            bottom: 5px;
            left: calc(50% - 42px);
            width: 84px;
            height: 72px;
            background: #4a2c1b;
            border-radius: 45% 55% 35% 35% / 70% 75% 35% 35%;
            box-shadow: inset -10px -5px 0 #2a180e;
            z-index: 3;
        }
        .body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 17px;
            width: 50px;
            height: 32px;
            background: #e6ccb2;
            border-radius: 10px 10px 50% 50% / 10px 10px 100% 100%;
        }

        /* ОБНОВЛЕННЫЕ КРУПНЫЕ ЛАПКИ */
        .paws {
            position: absolute;
            bottom: -4px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 16px;
            z-index: 4;
        }
        .paw {
            width: 24px;  
            height: 22px; 
            background: #f4f1de; 
            border-radius: 40% 40% 45% 45% / 60% 60% 40% 40%; 
            box-shadow: 0 3px 5px rgba(0,0,0,0.15), inset 0 -2px 0 rgba(0,0,0,0.08); 
            position: relative;
        }
        .paw::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 7px;
            width: 1px;
            height: 10px;
            background: rgba(0, 0, 0, 0.1); 
            box-shadow: 8px 0 0 rgba(0, 0, 0, 0.1); 
        }
        .paw::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 10px;
            background: #ffb3c6;
            bottom: 4px;
            left: calc(50% - 6px);
            border-radius: 50%;
            opacity: 0; 
            transition: opacity 0.2s ease;
        }

        .tail {
            position: absolute;
            width: 55px;
            height: 16px;
            background: #2a180e;
            border-radius: 12px;
            left: -32px;
    bottom: 24px;
    transform-origin: right center;
    animation: tailWag 0.9s ease-in-out infinite alternate;
}
@keyframes tailWag {
    0% { transform: rotate(-35deg); }
    100% { transform: rotate(15deg); }
}

/* ЭФФЕКТ ПАДЕНИЯ НА ЭКРАНЕ 1 */
.gravitational-fall {
    animation: fallPhysics 1.2s cubic-bezier(0.5, 0.05, 0.75, 0.35) forwards !important;
}
@keyframes fallPhysics {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(115vh) rotate(25deg); opacity: 0; }
}

/* ==========================================================
   ЭКРАН 2 (ОХОТА — ВСЁ СТРОГО ПО ЦЕНТРУ)
   ========================================================== */
.bush {
    position: absolute;
    bottom: -20px;
    width: 100%;
    height: 160px;
    background: #2d6a4f;
    border-radius: 100px 100px 0 0;
    z-index: 12;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
}

#cat2 {
    position: absolute;
    bottom: 40px;
    animation: buttWiggle 0.45s ease-in-out infinite alternate;
}
@keyframes buttWiggle {
    0% { transform: translateY(12px) rotate(-4deg); }
    100% { transform: translateY(0px) rotate(4deg); }
}

.target-heart {
    position: absolute;
    font-size: 65px; 
    color: #ff4d6d;
    top: 25%;
    z-index: 15;
    animation: heartFloat 1.8s ease-in-out infinite alternate;
    filter: drop-shadow(0 5px 15px rgba(255, 77, 109, 0.5));
}
@keyframes heartFloat {
    0% { transform: translateY(0) scale(0.9); }
    100% { transform: translateY(-25px) scale(1.1); }
}

/* Анимации атаки */
.cat-pounce {
    animation: pounceEffect 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important;
}
.cat-pounce .paw::after { opacity: 1 !important; }
.heart-stolen {
    animation: heartStolenEffect 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important;
}

/* ДОПИСАННАЯ АНИМАЦИЯ ПРЫЖКА КОТА */
@keyframes pounceEffect {
    0% { bottom: 40px; transform: scale(1) rotate(0deg); z-index: 16; }
    30% { bottom: 65%; transform: scale(1.1) rotate(-15deg); z-index: 16; } 
    45% { bottom: 65%; transform: scale(1.1) rotate(0deg); z-index: 16; }   
    70% { bottom: 40px; transform: scale(0.95) rotate(10deg); z-index: 16; } 
    100% { bottom: 40px; transform: scale(1) rotate(0deg); z-index: 16; }    
}

@keyframes heartStolenEffect {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    30% { transform: translateY(-50px) scale(1.2); opacity: 0.8; }
    100% { transform: translateY(-200px) scale(0); opacity: 0; }
}
</style>
</head>
<body>

    <!-- ЭКРАН 1 -->
    <div class="page" id="page1">
        <h1 class="love-text">I Love You</h1>
        
        <div class="cat-container" id="cat1">
            <div class="cat-body-wrapper">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="head">
                    <div class="eyes">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                    <div class="nose"></div>
                    <div class="cheeks"></div>
                    <div class="whiskers-left"><div></div><div></div></div>
                    <div class="whiskers-right"><div></div><div></div></div>
                </div>
                <div class="body"></div>
                <div class="paws">
                    <div class="paw"></div>
                    <div class="paw"></div>
                </div>
                <div class="tail"></div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 2 -->
    <div class="page" id="page2">
        <div class="target-heart">❤️</div>
        <div class="bush"></div>
        
        <div class="cat-container" id="cat2">
            <div class="cat-body-wrapper">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="head">
                    <div class="eyes">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                    <div class="nose"></div>
                    <div class="cheeks"></div>
                    <div class="whiskers-left"><div></div><div></div></div>
                    <div class="whiskers-right"><div></div><div></div></div>
                </div>
                <div class="body"></div>
                <div class="paws">
                    <div class="paw"></div>
                    <div class="paw"></div>
                </div>
                <div class="tail"></div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 3 -->
    <div class="page" id="page3">
        <h1 class="love-text" style="font-size: 3rem;">Forever & Always</h1>
    </div>

    <script>
        function createHearts(pageId, count) {
            const page = document.getElementById(pageId);
            if (!page) return;
            const icons = ['❤️', '💖', '💝', '💕', '💗'];
            
            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'bg-heart';
                heart.innerText = icons[Math.floor(Math.random() * icons.length)];
                
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                
                page.appendChild(heart);
            }
        }

        createHearts('page1', 15);
        createHearts('page2', 15);
        createHearts('page3', 15);
    </script>
</body>
</html>
