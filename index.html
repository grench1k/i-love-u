<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моей любимой ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔊 НЕВИДИМЫЙ РОМАНТИЧЕСКИЙ ПЛЕЕР -->
    <!-- loop зацикливает песню, чтобы она не прерывалась -->
    <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

    <!-- Глубокие романтичные неоновые сферы -->
    <div class="blur-glow glow-1" id="glow1"></div>
    <div class="blur-glow glow-2" id="glow2"></div>

    <!-- Объемные парящие сердца -->
    <div class="floating-ambient-hearts" id="heartsContainer"></div>

    <div class="mobile-container">
        <div class="premium-card" id="mainCard">
            <div class="card-glow-border"></div>
            
            <div class="badge-container">
                <span class="heart-badge">❤️ Only for You</span>
            </div>
            
            <h1>Моей любимой</h1>
            
            <p class="subtitle">Ты — лучшее, что случилось со мной. Каждое мгновение с тобой наполнено счастьем. Прикоснись к котику... ✨</p>

            <!-- Стеклянная рамка под фото -->
            <div class="glass-photo-frame"></div>

            <!-- Красивая интерактивная неоновая надпись -->
            <div class="love-neon-text">I love you</div>
            
            <!-- Интерактивная зона кота -->
            <div class="cat-touch-zone" onclick="triggerCatMagic()">
                <div class="css-luxury-cat" id="luxuryCat">
                    <div class="cat-ear left"></div>
                    <div class="cat-ear right"></div>
                    
                    <!-- Кошачья лапка -->
                    <div class="cat-paw"></div>
                    
                    <div class="cat-head-base">
                        <div class="cat-eye left"><div class="pupil"></div></div>
                        <div class="cat-eye right"><div class="pupil"></div></div>
                        <div class="cat-blush left"></div>
                        <div class="cat-blush right"></div>
                        <div class="cat-nose"></div>
                        <div class="cat-whiskers left"><span></span><span></span></div>
                        <div class="cat-whiskers right"><span></span><span></span></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Функция для запуска музыки при самом первом взаимодействии
        function initAudioOnFirstTouch() {
            const music = document.getElementById("bgMusic");
            if (music) {
                // Пытаемся воспроизвести аудио
                music.play().then(() => {
                    // Если успешно запустилось, снимаем слушатели, чтобы не перезапускать песню при каждом клике
                    document.body.removeEventListener('click', initAudioOnFirstTouch);
                    document.body.removeEventListener('touchstart', initAudioOnFirstTouch);
                }).catch(error => {
                    console.log("Автозвук заблокирован браузером, ждем клика:", error);
                });
            }
        }

        // Слушаем первый клик или первый тап на телефоне для старта музыки
        document.body.addEventListener('click', initAudioOnFirstTouch);
        document.body.addEventListener('touchstart', initAudioOnFirstTouch);

        function triggerCatMagic() {
            const cat = document.getElementById("luxuryCat");
            if (cat.classList.contains("jump-premium")) return;
            
            cat.classList.add("jump-premium");
            
            setTimeout(() => {
                window.location.href = "page2.html";
            }, 650);
        }

        // Автоматические фоновые сердца
        function createAmbientHeart() {
            const container = document.getElementById('heartsContainer');
            if(!container) return;
            
            const heart = document.createElement('div');
            const heartIcons = ['❤️', '💖', '💝', '💕'];
            heart.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            heart.className = 'ambient-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 14 + 12) + 'px';
            heart.style.opacity = Math.random() * 0.35 + 0.2;
            
            const duration = Math.random() * 5 + 6;
            heart.style.animation = `floatUpAndFade ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;
            
            container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, duration * 1000);
        }
        setInterval(createAmbientHeart, 700);

        // Взрыв сердечек при клике по экрану
        document.body.addEventListener('click', function(e) {
            const count = 12; 
            const shapes = ['❤️', '💖', '✨', '🌸', '💕'];
            
            for(let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'click-particle';
                p.innerHTML = shapes[Math.floor(Math.random() * shapes.length)];
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 80 + 40;
                const x = Math.cos(angle) * velocity;
                const y = Math.sin(angle) * velocity;
                
                p.style.setProperty('--x', `${x}px`);
                p.style.setProperty('--y', `${y}px`);
                p.style.fontSize = (Math.random() * 14 + 12) + 'px';
                
                document.body.appendChild(p);
                setTimeout(() => { p.remove(); }, 800);
            }
        });

        // 3D параллакс фона
        document.addEventListener('mousemove', function(e) {
            const moveX = (window.innerWidth / 2 - e.clientX) * 0.03;
            const moveY = (window.innerHeight / 2 - e.clientY) * 0.03;
            
            document.getElementById('glow1').style.transform = `translate(${moveX}px, ${moveY}px)`;
            document.getElementById('glow2').style.transform = `translate(${-moveX}px, ${-moveY}px)`;
            document.getElementById('mainCard').style.transform = `rotateY(${moveX * 0.5}deg) rotateX(${-moveY * 0.5}deg)`;
        });
    </script>

</body>
</html>
