<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днем Рождения, Любимая!</title>
    <!-- Подключаем внешний файл стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Эффект падающих сердечек -->
    <div class="falling-hearts" id="heartsContainer"></div>

    <div class="mobile-container">
        <div class="love-card">
            <div class="main-heart">❤️</div>
            
            <h1>С Днем Рождения, Любимая!</h1>
            
            <p>В этот особенный день я хочу сказать, как сильно я тебя люблю. Ты делаешь мою жизнь ярче, теплее и счастливее каждый день.</p>
            
            <p>Этот секретный сайт я создал своими руками специально для тебя. Загляни внутрь! 👇</p>

            <div class="photo-box">
                Здесь будет ваше красивое совместное фото
            </div>

            <div class="click-hint">Нажми на котика ✨</div>
            
            <!-- Интерактивный котик вместо кнопки -->
            <div class="cat-wrapper" onclick="catJumpAndRedirect()">
                <div class="css-cat" id="myCat">
                    <div class="ear left"></div>
                    <div class="ear right"></div>
                    <div class="cat-head">
                        <div class="eye left"></div>
                        <div class="eye right"></div>
                        <div class="blush left"></div>
                        <div class="blush right"></div>
                        <div class="nose"></div>
                        <div class="mustache left"></div>
                        <div class="mustache right"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Функция прыжка кота и перехода на новую страницу
        function catJumpAndRedirect() {
            const cat = document.getElementById("myCat");
            
            // Запускаем анимацию прыжка и зажмуривания из CSS
            cat.classList.add("jump-active");
            
            // Ровно через 600 миллисекунд (когда прыжок завершится) перенаправляем на page2.html
            setTimeout(() => {
                window.location.href = "page2.html";
            }, 600);
        }

        // Логика фоновых сердечек
        function createHeart() {
            const container = document.getElementById('heartsContainer');
            if(!container) return;
            
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 18 + 12) + 'px';
            heart.style.opacity = Math.random() * 0.4 + 0.3;
            heart.style.pointerEvents = 'none';
            
            const duration = Math.random() * 4 + 4;
            heart.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-out`;
            
            container.appendChild(heart);

            setTimeout(() => {
                const drift = Math.random() * 40 - 20; 
                heart.style.transform = `translate(${drift}px, 105vh) rotate(${Math.random() * 180 - 90}deg)`;
            }, 50);

            setTimeout(() => { heart.remove(); }, duration * 1000);
        }
        setInterval(createHeart, 450);
    </script>

</body>
</html>
