<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Твой сюрприз!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .surprise-card {
            background: #ffffff;
            color: #4a4a4a;
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin-top: 40px;
        }
        .surprise-card h2 {
            color: #ff4d6d;
            margin-top: 0;
            font-size: 1.7rem;
        }
    </style>
</head>
<body>

    <div class="falling-hearts"></div>

    <div class="mobile-container">
        <div class="surprise-card">
            <h2>🎁 Твой главный сюрприз!</h2>
            <p>Ура! Котик успешно перенес тебя на секретную страницу!</p>
            <p>Ты заслуживаешь всего самого лучшего в мире. Пусть этот день принесет тебе море улыбок!</p>
            <p><strong>Сегодня вечером тебя ждет свидание!</strong> Будь готова к 19:00, я заеду за тобой. Люблю тебя сильнее всех! 😘</p>
        </div>
    </div>

</body>
</html>
