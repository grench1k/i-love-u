<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Твой Сюрприз!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .premium-surprise-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 30px 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-align: center;
            opacity: 0;
            transform: scale(0.92);
            animation: cardReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardReveal {
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            background: linear-gradient(90deg, #ff758f, #ff7e5f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gift-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: inline-block;
            animation: giftWobble 2s ease-in-out infinite;
        }

        @keyframes giftWobble {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
        }

        .surprise-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.85);
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Поддерживаем ту же глубину светящегося фона на второй странице -->
    <div class="blur-glow glow-1"></div>
    <div class="blur-glow glow-2"></div>

    <div class="mobile-container">
        <div class="premium-surprise-card">
            <div class="gift-icon">🎁</div>
            <h2>Секретный экран</h2>
            <p class="surprise-text">Пример текста-заглушки. Сюда отлично встанет описание главного подарка или ваша тайная история любви.</p>
        </div>
    </div>

</body>
</html>
