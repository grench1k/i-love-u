<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сюрприз!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .surprise-card {
            background: #ffffff;
            color: #4a4a4a;
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .surprise-card h2 {
            color: #ff4d6d;
            margin-top: 0;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        .surprise-card p {
            margin: 0 0 8px 0;
            font-size: 0.95rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="falling-hearts"></div>

    <div class="mobile-container">
        <div class="surprise-card">
            <h2>Заголовок сюрприза 🎁</h2>
            <p>Пример короткого текста для второй страницы.</p>
            <p>Сюда поместится краткая информация о подарке или месте встречи.</p>
        </div>
    </div>

</body>
</html>
