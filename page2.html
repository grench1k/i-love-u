<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мое сердце принадлежит тебе ❤️</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .premium-surprise-card {
            background: rgba(255, 20, 100, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 32px;
            padding: 30px 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-align: center;
            opacity: 0;
            transform: scale(0.92);
            animation: cardReveal 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardReveal {
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            font-size: 1.55rem;
            font-weight: 800;
            margin: 0 0 12px 0;
            background: linear-gradient(90deg, #ff0055, #ff758f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .love-icon {
            font-size: 2.6rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: heartBeatGlow 1.2s infinite ease-in-out;
        }

        @keyframes heartBeatGlow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255,0,85,0)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 8px rgba(255, 0, 85, 0.6)); }
        }

        .surprise-text {
            font-size: 0.95rem;
            line-height: 1.55;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Единый глубокий фон со сферами -->
    <div class="blur-glow glow-1"></div>
    <div class="blur-glow glow-2"></div>

    <div class="mobile-container">
        <div class="premium-surprise-card">
            <div class="love-icon">💖</div>
            <h2>Секретное признание</h2>
            <p class="surprise-text">Пример короткого романтичного текста-заглушки. Когда котик допрыгнет сюда, ваша девушка прочитает ваши главные и самые нежные слова.</p>
        </div>
    </div>

</body>
</html>
